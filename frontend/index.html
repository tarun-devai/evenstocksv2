<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvenStocks</title>
  <link rel="icon" href="/static/logo.png" />
  <link rel="stylesheet" href="/static/css/styles.css" />
</head>
<body>

<div class="header">
  <div class="header-left">
    <img src="/static/logo.png" alt="EvenStocks" class="logo" />
    <div>
      <h1>EvenStocks</h1>
      <div class="status" id="status">Connecting...</div>
    </div>
  </div>
  <button class="btn-clear" onclick="clearChat()">New Chat</button>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <img src="/static/logo.png" alt="" class="welcome-logo" />
    <h2>EvenStocks AI Analyst</h2>
    <p>Type <strong>@</strong> followed by a stock name to search and tag stocks.<br>
    Select one or multiple stocks, then ask any question.</p>
    <div class="welcome-examples">
      <span class="example-chip" onclick="insertExample('@Tata ')">@Tata Motors</span>
      <span class="example-chip" onclick="insertExample('@Infosys ')">@Infosys</span>
      <span class="example-chip" onclick="insertExample('@Reliance ')">@Reliance</span>
    </div>
  </div>
</div>

<!-- Scroll to bottom button -->
<button class="scroll-bottom" id="scrollBtn" onclick="scrollToBottom()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <polyline points="6 9 12 15 18 9"/>
  </svg>
</button>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<div class="input-area">
  <div class="input-wrapper">
    <div class="input-row">
      <textarea
        id="input"
        rows="1"
        placeholder="Type @ to search stocks, then ask your question..."
        onkeydown="handleKey(event)"
        oninput="onInput()"
      ></textarea>
      <button class="btn-send" id="sendBtn" onclick="send()" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
      <button class="btn-stop" id="stopBtn" onclick="stopGen()" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <rect x="4" y="4" width="16" height="16" rx="2"/>
        </svg>
      </button>
    </div>
    <div class="autocomplete-dropdown" id="autocomplete"></div>
  </div>
  <div class="footer">EvenStocks &middot; AI-Powered Stock Analysis &middot; Type @ to tag stocks</div>
</div>

<script src="/static/js/app.js"></script>
</body>
</html>
