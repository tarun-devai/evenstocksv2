<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Analyzer</title>
<style>
  :root {
    --bg: #0a0a14; --surface: rgba(255,255,255,0.04); --surface2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08); --text: #e0e0e0; --muted: #666;
    --accent: #7c6ef0; --accent2: #a78bfa; --green: #4ade80; --red: #f87171;
    --user-bg: linear-gradient(135deg, #3b82f6, #6366f1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px; border-bottom: 1px solid var(--border);
            background: rgba(255,255,255,0.02); }
  .header h1 { font-size: 17px; color: #fff; display: flex; align-items: center; gap: 10px; }
  .header .status { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .header .status.active { color: var(--green); }
  .btn-clear { background: var(--surface); border: 1px solid var(--border); color: #888;
               padding: 6px 16px; border-radius: 8px; cursor: pointer; font-size: 12px;
               transition: all 0.2s; }
  .btn-clear:hover { background: var(--surface2); color: #bbb; }

  /* Search bar */
  .search-area { padding: 16px 24px; border-bottom: 1px solid var(--border);
                 background: rgba(124,110,240,0.03); }
  .search-row { display: flex; gap: 10px; max-width: 700px; margin: 0 auto; }
  .search-row input { flex: 1; padding: 12px 18px; border-radius: 12px;
                      border: 1px solid var(--border); background: var(--surface);
                      color: #fff; font-size: 15px; outline: none; font-family: inherit; }
  .search-row input:focus { border-color: rgba(124,110,240,0.5);
                            box-shadow: 0 0 0 3px rgba(124,110,240,0.1); }
  .search-row input::placeholder { color: #555; }
  .btn-search { padding: 10px 22px; border-radius: 12px; border: none;
                background: linear-gradient(135deg, #7c6ef0, #6366f1);
                color: #fff; font-size: 14px; cursor: pointer; font-weight: 500;
                transition: transform 0.15s; white-space: nowrap; }
  .btn-search:hover { transform: scale(1.03); }
  .btn-search:active { transform: scale(0.97); }

  /* Search results dropdown */
  .search-results { max-width: 700px; margin: 0 auto; position: relative; }
  .results-list { position: absolute; top: 4px; left: 0; right: 0; z-index: 10;
                  background: #1a1a2e; border: 1px solid var(--border);
                  border-radius: 12px; overflow: hidden; display: none;
                  box-shadow: 0 12px 40px rgba(0,0,0,0.5); }
  .results-list.show { display: block; }
  .result-item { padding: 12px 18px; cursor: pointer; display: flex;
                 justify-content: space-between; align-items: center;
                 border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: rgba(124,110,240,0.1); }
  .result-item .name { font-size: 14px; font-weight: 500; }
  .result-item .meta { font-size: 12px; color: var(--muted); display: flex; gap: 14px; }
  .result-item .meta span { white-space: nowrap; }
  .no-results { padding: 16px 18px; color: var(--muted); font-size: 13px; text-align: center; }

  /* Selected stock badge */
  .selected-stock { display: none; max-width: 700px; margin: 8px auto 0;
                    padding: 8px 16px; border-radius: 8px;
                    background: rgba(124,110,240,0.12); border: 1px solid rgba(124,110,240,0.25);
                    font-size: 13px; color: var(--accent2); }
  .selected-stock.show { display: flex; align-items: center; justify-content: space-between; }
  .selected-stock .stock-label { font-weight: 600; }

  /* Messages */
  .messages { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .msg { display: flex; gap: 12px; margin-bottom: 20px; max-width: 800px; margin-left: auto; margin-right: auto; }
  .msg .avatar { width: 34px; height: 34px; border-radius: 10px; display: flex;
                 align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px; }
  .msg.user .avatar { background: var(--user-bg); }
  .msg.assistant .avatar { background: rgba(124,110,240,0.15); }
  .msg .body { flex: 1; min-width: 0; }
  .msg .role { font-size: 11px; color: var(--muted); font-weight: 600;
               margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .msg .content { font-size: 14px; line-height: 1.7; word-break: break-word; }
  .msg .content h1, .msg .content h2, .msg .content h3 {
    color: #fff; margin: 16px 0 8px; }
  .msg .content h1 { font-size: 20px; }
  .msg .content h2 { font-size: 17px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
  .msg .content h3 { font-size: 15px; }
  .msg .content ul, .msg .content ol { padding-left: 20px; margin: 6px 0; }
  .msg .content li { margin: 4px 0; }
  .msg .content strong { color: #fff; }
  .msg .content pre { background: #12121f; border: 1px solid var(--border); border-radius: 8px;
                      padding: 14px; overflow-x: auto; margin: 10px 0; font-size: 13px; }
  .msg .content code { background: rgba(124,110,240,0.12); padding: 2px 6px; border-radius: 4px;
                       font-size: 0.9em; color: #c4b5fd; }
  .msg .content pre code { background: none; padding: 0; color: var(--text); }
  .msg .content table { border-collapse: collapse; margin: 10px 0; width: 100%; font-size: 13px; }
  .msg .content th, .msg .content td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .msg .content th { background: var(--surface2); color: #fff; font-weight: 600; }

  .cursor { display: inline-block; width: 6px; height: 16px; background: var(--accent);
            border-radius: 1px; vertical-align: text-bottom; animation: blink 1s infinite; }
  @keyframes blink { 0%,50% { opacity:1 } 51%,100% { opacity:0 } }

  /* Input */
  .input-area { padding: 12px 20px 18px; border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 8px; max-width: 800px; margin: 0 auto; align-items: flex-end; }
  .input-row textarea { flex: 1; padding: 12px 16px; border-radius: 14px;
                        border: 1px solid var(--border); background: var(--surface);
                        color: #fff; font-size: 14px; resize: none; outline: none;
                        font-family: inherit; line-height: 1.5; max-height: 120px; }
  .input-row textarea:focus { border-color: rgba(124,110,240,0.5); }
  .input-row textarea::placeholder { color: #555; }
  .btn-send, .btn-stop { width: 44px; height: 44px; border-radius: 12px; border: none;
                          cursor: pointer; display: flex; align-items: center; justify-content: center;
                          flex-shrink: 0; color: #fff; transition: transform 0.15s; }
  .btn-send { background: linear-gradient(135deg, #7c6ef0, #6366f1); }
  .btn-send:disabled { background: var(--surface); color: #444; cursor: default; }
  .btn-stop { background: linear-gradient(135deg, #ef4444, #dc2626); }
  .btn-send:active, .btn-stop:active { transform: scale(0.93); }
  .footer { text-align: center; margin-top: 8px; font-size: 11px; color: #333; }

  .welcome { text-align: center; padding: 60px 20px; color: var(--muted); }
  .welcome h2 { color: #fff; font-size: 22px; margin-bottom: 10px; }
  .welcome p { font-size: 14px; line-height: 1.7; max-width: 500px; margin: 0 auto; }

  .usage-badge { font-size: 11px; color: var(--muted); text-align: right;
                 max-width: 800px; margin: -12px auto 10px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Stock Analyzer</h1>
    <div class="status" id="status">Connecting...</div>
  </div>
  <button class="btn-clear" onclick="clearChat()">New Analysis</button>
</div>

<div class="search-area">
  <div class="search-row">
    <input type="text" id="searchInput" placeholder="Search stock name... (e.g. Tata Motors, Infosys, Reliance)"
           oninput="onSearchInput()" onkeydown="handleSearchKey(event)" autocomplete="off">
    <button class="btn-search" id="searchBtn" onclick="doSearch()">Search</button>
  </div>
  <div class="search-results">
    <div class="results-list" id="resultsList"></div>
    <div class="selected-stock" id="selectedBadge">
      <span>Analyzing: <span class="stock-label" id="selectedName"></span></span>
    </div>
  </div>
</div>

<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <h2>Stock Analysis Chatbot</h2>
    <p>Search for any stock above to get a detailed AI-powered analysis report.
       After the report, you can ask follow-up questions about the stock.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Ask a follow-up question about the stock..."
              onkeydown="handleKey(event)" disabled></textarea>
    <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/>
           <polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
    <button class="btn-stop" id="stopBtn" onclick="stopGen()" style="display:none">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <rect x="4" y="4" width="16" height="16" rx="2"/></svg>
    </button>
  </div>
  <div class="footer">Powered by Claude API &middot; Data from Screener.in</div>
</div>

<script>
  const msgBox = document.getElementById('messages');
  const searchInput = document.getElementById('searchInput');
  const resultsList = document.getElementById('resultsList');
  const selectedBadge = document.getElementById('selectedBadge');
  const selectedNameEl = document.getElementById('selectedName');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const stopBtn = document.getElementById('stopBtn');
  const statusEl = document.getElementById('status');
  const welcomeEl = document.getElementById('welcome');

  let ws, streaming = false, currentBubble = null, currentStock = null;
  let searchTimeout = null;

  // ── WebSocket ────────────────────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/stock-chat`);
    ws.onopen = () => {
      statusEl.textContent = 'Online';
      statusEl.className = 'status active';
    };
    ws.onclose = () => {
      statusEl.textContent = 'Disconnected';
      statusEl.className = 'status';
      setTimeout(connect, 2000);
    };
    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);

      if (data.type === 'search_results') {
        showSearchResults(data.results);
      }

      if (data.type === 'stream_start') {
        streaming = true;
        toggleButtons();
        if (welcomeEl) welcomeEl.style.display = 'none';
        currentBubble = addMessage('assistant', '');
        currentBubble.querySelector('.content').innerHTML = '<span class="cursor"></span>';
      }

      if (data.type === 'stream_delta' && currentBubble) {
        const el = currentBubble.querySelector('.content');
        const raw = (el._rawText || '') + data.content;
        el._rawText = raw;
        el.innerHTML = renderMarkdown(raw) + '<span class="cursor"></span>';
        msgBox.scrollTop = msgBox.scrollHeight;
      }

      if (data.type === 'stream_end') {
        streaming = false;
        toggleButtons();
        if (currentBubble) {
          const el = currentBubble.querySelector('.content');
          el.innerHTML = renderMarkdown(el._rawText || '');
          // Show usage
          if (data.usage) {
            const badge = document.createElement('div');
            badge.className = 'usage-badge';
            badge.textContent = `tokens: ${data.usage.input_tokens} in / ${data.usage.output_tokens} out`;
            currentBubble.after(badge);
          }
        }
        currentBubble = null;
        inputEl.disabled = false;
        inputEl.placeholder = 'Ask a follow-up question about ' + (currentStock || 'the stock') + '...';
        inputEl.focus();
      }

      if (data.type === 'cleared') {
        msgBox.innerHTML = '';
        if (welcomeEl) {
          msgBox.appendChild(welcomeEl);
          welcomeEl.style.display = '';
        }
        currentStock = null;
        selectedBadge.classList.remove('show');
        inputEl.disabled = true;
        inputEl.placeholder = 'Ask a follow-up question about the stock...';
      }

      if (data.type === 'error') {
        addMessage('assistant', data.message);
      }
    };
  }

  // ── Search ───────────────────────────────────────────
  function onSearchInput() {
    clearTimeout(searchTimeout);
    const q = searchInput.value.trim();
    if (q.length < 2) {
      resultsList.classList.remove('show');
      return;
    }
    searchTimeout = setTimeout(() => doSearch(), 300);
  }

  function doSearch() {
    const q = searchInput.value.trim();
    if (!q || !ws || ws.readyState !== 1) return;
    ws.send(JSON.stringify({ action: 'search', query: q }));
  }

  function handleSearchKey(e) {
    if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
    if (e.key === 'Escape') { resultsList.classList.remove('show'); }
  }

  function showSearchResults(results) {
    resultsList.innerHTML = '';
    if (!results.length) {
      resultsList.innerHTML = '<div class="no-results">No stocks found. Try a different name.</div>';
      resultsList.classList.add('show');
      return;
    }
    results.forEach(r => {
      const div = document.createElement('div');
      div.className = 'result-item';
      div.innerHTML = `
        <span class="name">${r.stock_name.replace(/_/g, ' ')}</span>
        <span class="meta">
          ${r.market_cap ? '<span>MCap: ' + r.market_cap + '</span>' : ''}
          ${r.current_price ? '<span>Price: ' + r.current_price + '</span>' : ''}
          ${r.stock_pe ? '<span>PE: ' + r.stock_pe + '</span>' : ''}
        </span>`;
      div.onclick = () => selectStock(r.stock_name);
      resultsList.appendChild(div);
    });
    resultsList.classList.add('show');
  }

  function selectStock(stockName) {
    resultsList.classList.remove('show');
    currentStock = stockName;
    searchInput.value = stockName.replace(/_/g, ' ');
    selectedNameEl.textContent = stockName.replace(/_/g, ' ');
    selectedBadge.classList.add('show');

    // Clear previous and start analysis
    ws.send(JSON.stringify({ action: 'clear' }));
    setTimeout(() => {
      if (welcomeEl) welcomeEl.style.display = 'none';
      addMessage('user', 'Analyze: ' + stockName.replace(/_/g, ' '));
      ws.send(JSON.stringify({ action: 'analyze', stock_name: stockName }));
    }, 100);
  }

  // ── Follow-up messages ───────────────────────────────
  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || streaming) return;
    addMessage('user', text);
    ws.send(JSON.stringify({ action: 'message', content: text }));
    inputEl.value = '';
    inputEl.style.height = 'auto';
  }

  function stopGen() {
    ws.send(JSON.stringify({ action: 'stop' }));
  }

  function clearChat() {
    ws.send(JSON.stringify({ action: 'clear' }));
    searchInput.value = '';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    sendBtn.disabled = !inputEl.value.trim();
  }

  function toggleButtons() {
    sendBtn.style.display = streaming ? 'none' : 'flex';
    stopBtn.style.display = streaming ? 'flex' : 'none';
    sendBtn.disabled = !inputEl.value.trim();
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '&#128100;' : '&#128202;'}</div>
      <div class="body">
        <div class="role">${role === 'user' ? 'You' : 'Analyst'}</div>
        <div class="content">${role === 'user' ? escapeHtml(text) : text}</div>
      </div>`;
    msgBox.appendChild(div);
    msgBox.scrollTop = msgBox.scrollHeight;
    return div;
  }

  // ── Simple markdown renderer ─────────────────────────
  function renderMarkdown(text) {
    let html = escapeHtml(text);
    // Code blocks
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Headers
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Unordered lists
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
    // Line breaks
    html = html.replace(/\n\n/g, '<br><br>');
    html = html.replace(/\n/g, '<br>');
    // Clean up
    html = html.replace(/<br><\/ul>/g, '</ul>');
    html = html.replace(/<ul><br>/g, '<ul>');
    return html;
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  inputEl.addEventListener('input', () => {
    sendBtn.disabled = !inputEl.value.trim();
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Close search results when clicking outside
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-area')) {
      resultsList.classList.remove('show');
    }
  });

  connect();
</script>
</body>
</html>
